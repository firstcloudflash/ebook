<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>CSS Gradient Veil Card</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
        radial-gradient(circle at top,
        rgba(90,90,255,.15),
        transparent 30%),

        radial-gradient(circle at bottom,
        rgba(255,120,120,.12),
        transparent 35%),

        #050505;

      font-family:'Inter',sans-serif;
      overflow:hidden;
      padding:40px;
    }

    /* Ambient Glow */

    .ambient-light{
      position:absolute;
      width:700px;
      height:700px;
      border-radius:50%;
      filter:blur(120px);
      opacity:.45;
      z-index:0;
    }

    .ambient-light.one{
      background:#4f7cff;
      top:-250px;
      left:-200px;
    }

    .ambient-light.two{
      background:#ff6b9f;
      bottom:-250px;
      right:-200px;
    }

    /* Main Card */

    .veil-card{
      position:relative;
      width:360px;
      height:520px;
      border-radius:34px;
      overflow:hidden;

      background:
        radial-gradient(circle at top left,
        rgba(255,255,255,.12),
        transparent 25%),

        radial-gradient(circle at bottom right,
        rgba(255,255,255,.08),
        transparent 30%),

        linear-gradient(
        145deg,
        rgba(20,20,20,.95),
        rgba(8,8,8,.92)
        );

      border:1px solid rgba(255,255,255,.08);

      box-shadow:
        0 20px 80px rgba(0,0,0,.6),
        inset 0 1px 0 rgba(255,255,255,.08);

      backdrop-filter:blur(30px);

      z-index:2;
    }

    /* Gradient Veils */

    .veil{
      position:absolute;
      border-radius:50%;
      filter:blur(60px);
      mix-blend-mode:screen;
      opacity:.85;
    }

    .veil.one{
      width:240px;
      height:240px;
      background:#7c5cff;
      top:-60px;
      left:-60px;
      animation:floatOne 8s ease-in-out infinite;
    }

    .veil.two{
      width:220px;
      height:220px;
      background:#ff4d8d;
      bottom:-80px;
      right:-60px;
      animation:floatTwo 10s ease-in-out infinite;
    }

    .veil.three{
      width:180px;
      height:180px;
      background:#5ee7ff;
      top:40%;
      left:50%;
      transform:translate(-50%,-50%);
      opacity:.5;
      animation:pulse 6s ease-in-out infinite;
    }

    /* Noise Overlay */

    .noise{
      position:absolute;
      inset:0;
      opacity:.05;
      background-image:url("https://grainy-gradients.vercel.app/noise.svg");
      background-size:cover;
      mix-blend-mode:soft-light;
      pointer-events:none;
    }

    /* Image */

    .veil-card img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:2;

      mix-blend-mode:screen;
      opacity:.92;
    }

    /* Dark Fade */

    .fade{
      position:absolute;
      inset:0;

      background:
        linear-gradient(
        to top,
        rgba(0,0,0,.82),
        rgba(0,0,0,.15),
        transparent
        );

      z-index:3;
    }

    /* Content */

    .content{
      position:absolute;
      bottom:0;
      left:0;
      width:100%;
      padding:28px;
      z-index:5;
      color:white;
    }

    .tag{
      width:max-content;
      padding:8px 14px;
      border-radius:999px;

      background:rgba(255,255,255,.08);

      border:1px solid rgba(255,255,255,.1);

      backdrop-filter:blur(20px);

      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;

      margin-bottom:16px;
    }

    h1{
      font-size:34px;
      line-height:1;
      margin-bottom:12px;
      font-weight:700;
    }

    p{
      font-size:14px;
      line-height:1.7;
      color:rgba(255,255,255,.72);
      margin-bottom:24px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      gap:10px;

      padding:14px 22px;

      border-radius:16px;

      text-decoration:none;
      color:white;
      font-weight:600;

      background:
        linear-gradient(
        135deg,
        #7c5cff,
        #5ee7ff
        );

      box-shadow:
        0 10px 30px rgba(124,92,255,.35);

      transition:.4s ease;
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.02);
    }

    /* Animations */

    @keyframes floatOne{
      0%,100%{
        transform:translate(0,0);
      }

      50%{
        transform:translate(20px,30px);
      }
    }

    @keyframes floatTwo{
      0%,100%{
        transform:translate(0,0);
      }

      50%{
        transform:translate(-30px,-20px);
      }
    }

    @keyframes pulse{
      0%,100%{
        transform:translate(-50%,-50%) scale(1);
      }

      50%{
        transform:translate(-50%,-50%) scale(1.2);
      }
    }

  </style>
</head>

<body>

  <!-- Ambient Lights -->

  <div class="ambient-light one"></div>
  <div class="ambient-light two"></div>

  <!-- Veil Card -->

  <div class="veil-card">

    <!-- Gradient Veils -->

    <div class="veil one"></div>
    <div class="veil two"></div>
    <div class="veil three"></div>

    <!-- Noise Texture -->

    <div class="noise"></div>

    <!-- Image -->

    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop" alt="Portrait">

    <!-- Fade -->

    <div class="fade"></div>

    <!-- Content -->

    <div class="content">

      <div class="tag">
        DIGITAL VEIL SYSTEM
      </div>

      <h1>
        Cinematic
        Gradient
        Card
      </h1>

      <p>
        A photography-inspired CSS backdrop system using
        layered gradients, atmospheric glow, blur,
        cinematic shadows, and digital light veils.
      </p>

      <a href="#" class="btn">
        Explore Design
      </a>

    </div>

  </div>

</body>
</html>
