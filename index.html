<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Empire of Emotions</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div id="app">

    <!-- HERO -->
    <section class="hero">
      <div class="overlay"></div>
      <div class="hero-content">
        <h1>EMPIRE OF EMOTIONS</h1>
        <p>A cinematic world of memory, power, and identity</p>
      </div>
    </section>

    <!-- WORLD INTRO -->
    <section class="scene" id="scene-1">
      <div class="text">
        This is not a product.<br/>
        This is an emotional universe built as memory.
      </div>
    </section>

    <!-- PORTALS -->
    <section class="portals">

      <div class="portal" data-target="story">
        📖 ENTER THE STORY
      </div>

      <div class="portal" data-target="collection">
        🖼️ ENTER THE COLLECTION
      </div>

      <div class="portal" data-target="archive">
        🧾 ENTER THE ARCHIVE
      </div>

    </section>

    <!-- FOOTER EMOTION -->
    <section class="final">
      The Empire continues beyond what you see.
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
