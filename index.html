<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Gradient Veil Portrait</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      font-family:'Inter',sans-serif;

      background:
      radial-gradient(circle at top left,
      rgba(90,120,255,.12),
      transparent 30%),

      radial-gradient(circle at bottom right,
      rgba(255,80,120,.12),
      transparent 30%),

      #050505;
    }

    /* Ambient Background Glow */

    .ambient{
      position:absolute;
      width:700px;
      height:700px;
      border-radius:50%;
      filter:blur(120px);
      opacity:.4;
      z-index:0;
    }

    .ambient.one{
      background:#6c63ff;
      top:-250px;
      left:-250px;
    }

    .ambient.two{
      background:#ff4f8b;
      bottom:-250px;
      right:-250px;
    }

    /* Main Card */

    .veil-card{
      position:relative;

      width:360px;
      height:560px;

      border-radius:34px;
      overflow:hidden;

      background:
      linear-gradient(
      145deg,
      rgba(18,18,18,.95),
      rgba(5,5,5,.92)
      );

      border:1px solid rgba(255,255,255,.08);

      box-shadow:
      0 25px 80px rgba(0,0,0,.65),
      inset 0 1px 0 rgba(255,255,255,.06);

      backdrop-filter:blur(30px);

      z-index:2;
    }

    /* Portrait */

    .veil-card img{
      position:absolute;
      inset:0;

      width:100%;
      height:100%;

      object-fit:cover;

      z-index:1;
    }

    /* Digital Gradient Veils */

    .veil{
      position:absolute;
      border-radius:50%;
      filter:blur(70px);
      mix-blend-mode:screen;
      opacity:.75;
      z-index:2;
      pointer-events:none;
    }

    .veil.one{
      width:260px;
      height:260px;

      background:#6c63ff;

      top:-80px;
      left:-60px;

      animation:floatOne 8s ease-in-out infinite;
    }

    .veil.two{
      width:220px;
      height:220px;

      background:#ff4f8b;

      bottom:-60px;
      right:-60px;

      animation:floatTwo 10s ease-in-out infinite;
    }

    .veil.three{
      width:180px;
      height:180px;

      background:#5ee7ff;

      top:45%;
      left:50%;

      transform:translate(-50%,-50%);

      opacity:.4;

      animation:pulse 6s ease-in-out infinite;
    }

    /* Glass Overlay */

    .glass{
      position:absolute;
      inset:0;

      background:
      linear-gradient(
      to bottom,
      rgba(255,255,255,.08),
      rgba(255,255,255,.02),
      rgba(0,0,0,.35)
      );

      z-index:3;

      backdrop-filter:blur(2px);
    }

    /* Noise Texture */

    .noise{
      position:absolute;
      inset:0;

      background-image:
      radial-gradient(rgba(255,255,255,.08) 1px, transparent 1px);

      background-size:4px 4px;

      opacity:.04;

      z-index:4;

      mix-blend-mode:soft-light;
    }

    /* Fade */

    .fade{
      position:absolute;
      inset:0;

      background:
      linear-gradient(
      to top,
      rgba(0,0,0,.88),
      rgba(0,0,0,.2),
      transparent
      );

      z-index:5;
    }

    /* Content */

    .content{
      position:absolute;
      bottom:0;
      left:0;

      width:100%;

      padding:30px;

      z-index:10;
      color:white;
    }

    .tag{
      width:max-content;

      padding:8px 14px;

      border-radius:999px;

      background:rgba(255,255,255,.08);

      border:1px solid rgba(255,255,255,.08);

      backdrop-filter:blur(20px);

      font-size:11px;
      letter-spacing:.15em;
      text-transform:uppercase;

      margin-bottom:18px;
    }

    h1{
      font-size:36px;
      line-height:1;
      margin-bottom:14px;
      font-weight:700;
    }

    p{
      color:rgba(255,255,255,.72);

      font-size:14px;
      line-height:1.7;

      margin-bottom:24px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;

      padding:14px 24px;

      border-radius:16px;

      text-decoration:none;
      color:white;

      font-weight:600;

      background:
      linear-gradient(
      135deg,
      #6c63ff,
      #5ee7ff
      );

      box-shadow:
      0 10px 30px rgba(108,99,255,.35);

      transition:.4s ease;
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.03);
    }

    /* Animations */

    @keyframes floatOne{
      0%,100%{
        transform:translate(0,0);
      }

      50%{
        transform:translate(20px,30px);
      }
    }

    @keyframes floatTwo{
      0%,100%{
        transform:translate(0,0);
      }

      50%{
        transform:translate(-25px,-20px);
      }
    }

    @keyframes pulse{
      0%,100%{
        transform:translate(-50%,-50%) scale(1);
      }

      50%{
        transform:translate(-50%,-50%) scale(1.15);
      }
    }

  </style>
</head>

<body>

  <!-- Ambient Glow -->

  <div class="ambient one"></div>
  <div class="ambient two"></div>

  <!-- Card -->

  <div class="veil-card">

    <!-- Portrait -->

    <img src="https://i.postimg.cc/JhLY6Rxh/IMG-0911.jpg" alt="Portrait">

    <!-- Gradient Veils -->

    <div class="veil one"></div>
    <div class="veil two"></div>
    <div class="veil three"></div>

    <!-- Glass -->

    <div class="glass"></div>

    <!-- Noise -->

    <div class="noise"></div>

    <!-- Fade -->

    <div class="fade"></div>

    <!-- Content -->

    <div class="content">

      <div class="tag">
        DIGITAL BACKDROP SYSTEM
      </div>

      <h1>
        Gradient
        Veil
        Portrait
      </h1>

      <p>
        A cinematic portrait card using CSS gradient
        veils, glow atmospheres, glass overlays,
        and digital studio-light aesthetics.
      </p>

      <a href="#" class="btn">
        Explore Visual
      </a>

    </div>

  </div>

</body>
</html>
